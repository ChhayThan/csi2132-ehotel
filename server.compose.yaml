services:
  db:
    build:
      context: ./backend
      dockerfile: db.dockerfile
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - DB_NAME
      - DB_USER
      - DB_PASSWORD
      - POSTGRES_DB=${DB_NAME:-ehoteldb}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - DB_WS_USER_PASSWORD
      - DB_WS_CUSTOMER_PASSWORD
      - DB_WS_EMPLOYEE_PASSWORD
      - DB_WS_ADMIN_PASSWORD
      - DB_WS_AUTH_PASSWORD
    command: ["postgres", "-c", "password_encryption=scram-sha-256"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ehoteldb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-5432}:5432"

  backend:
    build:
      context: ./backend
      dockerfile: app.dockerfile
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - AUTH_SECRET_KEY
      - AUTH_ALGORITHM
      - AUTH_ACCESS_TOKEN_EXPIRE_MINUTES
      - DB_NAME
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER
      - DB_PASSWORD
      - DB_WS_USER_PASSWORD
      - DB_WS_CUSTOMER_PASSWORD
      - DB_WS_EMPLOYEE_PASSWORD
      - DB_WS_ADMIN_PASSWORD
      - DB_WS_AUTH_PASSWORD
    command: ["fastapi", "dev", "--entrypoint", "api:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  db_data: